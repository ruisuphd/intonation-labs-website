# Deploys to Firebase Hosting production (live channel) whenever main is updated,
# i.e. every time a PR is merged.
#
# Auth is keyless via Workload Identity Federation (the org policy
# iam.disableServiceAccountKeyCreation forbids service-account key files):
# GitHub's OIDC token is exchanged for credentials of the deploy service
# account. Requires the workload identity pool "github-actions" with provider
# "github-oidc" in project intonation-web-page, and the repo bound to
# github-action-firebase-hosting@intonation-web-page.iam.gserviceaccount.com
# via roles/iam.workloadIdentityUser.
name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write # required to mint the GitHub OIDC token

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud (keyless OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/231104998690/locations/global/workloadIdentityPools/github-actions/providers/github-oidc
          service_account: github-action-firebase-hosting@intonation-web-page.iam.gserviceaccount.com

      - name: Deploy to live channel
        run: npx firebase-tools@latest deploy --only hosting --project intonation-web-page --non-interactive
