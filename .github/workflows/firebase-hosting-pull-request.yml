# Builds every pull request and deploys it to a temporary Firebase Hosting
# preview channel (expires after 7 days), then comments the preview URL on the
# PR. Production is only touched by the merge workflow.
#
# Auth is keyless via Workload Identity Federation — see
# firebase-hosting-merge.yml for the required Google Cloud setup.
name: Deploy preview on PR

on: pull_request

permissions:
  contents: read
  id-token: write # required to mint the GitHub OIDC token
  pull-requests: write # required to comment the preview URL

jobs:
  build_and_preview:
    # Skip for PRs from forks — they can't use the workload identity binding.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud (keyless OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/231104998690/locations/global/workloadIdentityPools/github-actions/providers/github-oidc
          service_account: github-action-firebase-hosting@intonation-web-page.iam.gserviceaccount.com

      - name: Deploy to preview channel
        id: preview
        run: |
          npx firebase-tools@latest hosting:channel:deploy "pr${{ github.event.number }}" \
            --project intonation-web-page --expires 7d --non-interactive --json > channel.json
          echo "url=$(python3 -c "import json; d = json.load(open('channel.json')); print(list(d['result'].values())[0]['url'])")" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.number }} --repo ${{ github.repository }} \
            --body "🔍 Preview deployed (expires in 7 days): ${{ steps.preview.outputs.url }}"
